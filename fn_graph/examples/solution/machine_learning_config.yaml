pipeline:
  run_id: ml_run_001
  on_failure: finish_running

artifact_store:
  type: fs
  base_dir: ./artifacts

stages:
  preprocessing:
    executor: memory
    nodes: [iris, data, preprocess_data, investigate_data]
  splitting:
    executor: memory
    nodes: [split_data, training_features, training_target, test_features, test_target]
  training:
    executor: docker
    image: fn_graph_worker_v2
    nodes: [model]
  evaluation:
    executor: memory
    nodes: [predictions, classification_metrics, confusion_matrix]

# Keep node-level config as fallback for non-stage runs
nodes:
  model:
    executor: docker
    image: fn_graph_worker_v2
  "*":
    executor: memory
