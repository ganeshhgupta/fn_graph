pipeline:
  run_id: toy_docker_001
  on_failure: finish_running

artifact_store:
  type: fs
  base_dir: ./artifacts

nodes:
  run_model:
    executor: docker
    image: fn_graph_worker_v2
    retry:
      max_attempts: 3
      delay_seconds: 2
      backoff: exponential

  "*":
    executor: memory
